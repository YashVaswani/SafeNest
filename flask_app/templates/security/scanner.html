{% extends "base.html" %}
{% block title %}QR Scanner — SafeNest{% endblock %}
{% block page_title %}QR Scanner{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card animate-in">
            <div class="card-header text-center"><i class="bi bi-qr-code-scan me-2"></i>Scan Helper QR Code</div>
            <div class="card-body p-4">
                <div id="scanner-container" class="scanner-container mb-3">
                    <div id="reader" style="width:100%"></div>
                </div>
                <div id="scan-status" class="text-center">
                    <p class="text-muted"><i class="bi bi-camera me-1"></i>Point camera at helper's QR code</p>
                </div>
                <div id="scan-result" class="d-none mt-3"></div>
                <hr>
                <p class="text-center mb-2 fw-semibold">Or enter token manually:</p>
                <form id="manualForm" class="d-flex gap-2">
                    <input type="text" class="form-control" id="manualToken" placeholder="Paste QR token...">
                    <button type="submit" class="btn btn-primary">Verify</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    const resultDiv = document.getElementById('scan-result');
    const statusDiv = document.getElementById('scan-status');

    function handleScan(decodedText) {
        // Extract token from URL
        let token = decodedText;
        if (decodedText.includes('/verify/')) {
            token = decodedText.split('/verify/').pop();
        }
        window.location.href = '/security/verify/' + token;
    }

    try {
        const scanner = new Html5QrcodeScanner("reader", {
            fps: 10, qrbox: { width: 250, height: 250 },
            aspectRatio: 1.0
        });
        scanner.render(handleScan, (err) => {});
    } catch(e) {
        statusDiv.innerHTML = '<div class="alert alert-warning"><i class="bi bi-exclamation-triangle me-1"></i>Camera not available. Use manual entry below.</div>';
    }

    document.getElementById('manualForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const token = document.getElementById('manualToken').value.trim();
        if (token) window.location.href = '/security/verify/' + token;
    });
});
</script>
{% endblock %}
